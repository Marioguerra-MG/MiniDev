<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeLand</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/geral/css/logicakids.css">
</head>

<body>

    <div class="app">

        <!-- VOLTAR -->
        <div class="voltar">
            <a href="/index.html">
                <i class="fa-solid fa-house"></i>
            </a>
        </div>

        <!-- TÍTULO 
        <p>Ajude o Robô 🤖 a salvar a ilha!</p>
        -->

        <!-- MISSÕES -->
        <div id="mission"></div>

        <hr>

    </div>


    <!-- CERTIFICADO -->
    <div id="certificado" class="certificado">

        <h1>🏆 Certificado de MiniDev 🏆</h1>

        <p>Este certificado é entregue para</p>

        <h2 id="cert-nome">Nome</h2>

        <p>por completar o módulo</p>

        <h3 id="cert-curso">Curso</h3>

        <div>
            <p>⭐ Nível <span id="cert-nivel"></span></p>
            <p>💎 XP conquistado: <span id="cert-xp"></span></p>
        </div>


        <p class="cert-footer">Continue aprendendo e se tornando um mini programador 🚀</p>

    </div>


    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- BANCO DE PERGUNTAS -->
